<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        n = parseInt(prompt("Enter size of an array : "));
        arr = [];

        for (i = 0; i < n; i++) {
            arr[i] = parseInt(prompt("Enter Number : "));
        }

        document.write(arr);
        // 4,6,1,7,3
        for (i = 0; i < arr.length; i++) {
            for (j = i + 1; j < arr.length; j++) { 
                if (arr[j] < arr[i]) { 
                    temp = arr[i];  
                    arr[i] = arr[j]; 
                    arr[j] = temp;  
                }
            }
        }
        document.write("<br>")
        document.write("Updated Array",arr);
    </script>
</body>

</html>
