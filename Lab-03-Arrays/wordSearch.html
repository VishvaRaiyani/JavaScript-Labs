<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        s = prompt("Enter Sentence : ");

        // s.split();

        temp = s.split(" ")
        // '' - charcacter thi alag pade
        // ' ' - space thi alag pade

        u = prompt("Enter word for search : ");
        document.write(temp + "<br>")

        for(i = 0 ; i < temp.length ; i++){
            if(temp[i] == u){
                document.write("Index of your word in sentence is : "+(i+1));
                break;
            }
        }        
    </script>
</body>
</html>
