<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForOfLoop</title>
</head>
<body>
    <script>
        let n = 'JAVASCRIPT'

        for(const element of n){
            console.log(element)
        }

        let arr = [1,2,3,4,5]

        for (const element of arr) {
            console.log(element*2)
        }
    </script>
</body>
</html>
