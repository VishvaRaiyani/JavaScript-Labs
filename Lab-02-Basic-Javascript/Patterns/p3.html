<!DOCTYPE html>
<html>

<body>

    <script>
          let n=parseInt(prompt("Enter n"))
          let num=1
        for (let i = 1; i <= n; i++) {
            for (let j = 1; j <= i; j++) {
                document.write(num + " ");
                if(num==1){
                    num=0
                }
                else {
                    num=1
                }
            }
            document.write("<br>");
        }

    </script>

</body>

</html>
