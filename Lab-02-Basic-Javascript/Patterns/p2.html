<!DOCTYPE html>
<html>

<body>

    <script>
   let n= parseInt(prompt("Enter row :"))
        for (let i = n; i >= 1; i--) {
            for (let j = i; j >= 1; j--) {
                document.write(j+"&nbsp;");
            }
            document.write("<br>");
        }

    </script>

</body>

</html>
