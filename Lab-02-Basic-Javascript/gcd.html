<!DOCTYPE html>
<html>

<body>

    <script>

        let a = parseInt(prompt("Enter first number:"));
        let b = parseInt(prompt("Enter second number:"));

        let gcd = 1;

        for (let i = 1; i <= a && i <= b; i++) {
            if (a % i == 0 && b % i == 0) {
                gcd = i;
            }
        }

        alert("GCD = " + gcd);

    </script>

</body>

</html>
