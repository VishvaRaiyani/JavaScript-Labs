<!DOCTYPE html>
<html>

<body>

    <script>

        let num = parseInt(prompt("Enter a number:"));

        document.write("Factors are:<br>");

        for (let i = 1; i <= num; i++) {
            if (num % i == 0) {
                document.write(i + "<br>");
            }
        }

    </script>

</body>

</html>
