<!-- 1. Demonstrate the Arrow functions. (A) -->
<!-- Arrow functions are a concise way to write functions in JavaScript -->
<!-- Theory:
Arrow Functions were introduced in ES6 (ECMAScript 2015).
They provide a shorter and cleaner syntax for writing functions.

General Syntax:
const functionName = (parameters) => {
    // code
};

Advantages:
1. Less code compared to normal functions.
2. Easy to read and understand.
3. Widely used in modern JavaScript frameworks such as React.
4. Suitable for simple functions.

Examples:
Normal Function:
function add(a, b) {
    return a + b;
}

Arrow Function:
const add = (a, b) => {
    return a + b;
}; -->

<!DOCTYPE html>
<html>

<head>
    <title>Arrow Function Demonstration</title>
</head>

<body>

    <h1>Arrow Function Demonstration</h1>
    <script>

        // =====================================================
        // Example 1: Arrow Function with Multiple Parameters
        // =====================================================

        // Function to add two numbers
        const add = (a, b) => {
            return a + b;
        };
        console.log("Addition of 10 and 20 = " + add(10, 20));

        // =====================================================
        // Example 2: Arrow Function with One Parameter
        // =====================================================

        // Function to find square of a number
        // if there is only one parameter, parentheses can be omitted
        const square = n => {
            return n * n;
        };
        console.log("Square of 5 = " + square(5));

        // =====================================================
        // Example 3: Arrow Function with No Parameters
        // =====================================================

        // Function returning a greeting message
        const greet = () => {
            return "Welcome to JavaScript";
        };
        //if there are no parameters, parentheses are still required
        console.log(greet());

        // =====================================================
        // Example 4: Arrow Function with Implicit Return
        // =====================================================
        // Arrow function with no parameters and implicit return
        const getPi = () => 3.14;
        console.log("Value of Pi = " + getPi());

        // =====================================================
        // Example 5: Arrow Function with Implicit Return
        // =====================================================

        // Return statement is omitted because there is only one expression
        const multiply = (a, b) => a * b;
        console.log("Multiplication of 5 and 4 = " + multiply(5, 4));

        // =====================================================
        // Example 6: Arrow Function with Multiple Statements
        // =====================================================

        //multiple statements require curly braces and explicit return
        const complexFunction = (x, y) => {
            const sum = x + y;
            const product = x * y;
            return `Sum: ${sum}, Product: ${product}`;
        };
        console.log(complexFunction(5, 4));

        //round bracket is used to call the function and pass arguments, while curly bracket is used to define the function body.   

        //Arrow function is often used with array methods like map, filter, and reduce for concise and readable code.
        const numbers = [1, 2, 3, 4, 5];
        const doubled = numbers.map(num => num * 2);
        console.log(doubled);

        //with objects, arrow functions do not have their own 'this' context, so they inherit 'this' from the surrounding scope.
        //This can lead to unexpected behavior when used as methods in objects.
        const person = {
            name: "Alice",
            age: 30,
            // This will not work as expected because 'this' does not refer to the person object
            // greet: () => {
            //     console.log(`Hello, my name is ${this.name} and I am ${this.age} years old.`);
            // }
            greet: function() {
                console.log(`Hello, my name is ${this.name} and I am ${this.age} years old.`);
            }
        };
        person.greet();
        
        /*
        =====================================================
        EXAMPLE 1: Using Arrow Function as Object Method
        =====================================================
        */

        const person1 = {
            name: "Alice",
            age: 30,

            // Arrow Function Method
            greet: () => {
                console.log(
                    `Hello, my name is ${this.name} and I am ${this.age} years old.`
                );
            }
        };

        console.log("Arrow Function Output:");
        person1.greet();

        /*
        Expected Output:

        Arrow Function Output:
        Hello, my name is undefined and I am undefined years old.

        Reason:
        Arrow functions do not have their own 'this'.
        Here, 'this' refers to the global/window object
        instead of person1.
        */


        /*
        =====================================================
        EXAMPLE 2: Using Normal Function as Object Method
        =====================================================
        */

        const person2 = {
            name: "Alice",
            age: 30,

            // Normal Function Method
            greet: function () {
                console.log(
                    `Hello, my name is ${this.name} and I am ${this.age} years old.`
                );
            }
        };

        console.log("Normal Function Output:");
        person2.greet();

        /*
        Expected Output:

        Normal Function Output:
        Hello, my name is Alice and I am 30 years old.

        Reason:
        When person2.greet() is called,
        JavaScript automatically sets:

        this = person2

        Therefore:
        this.name -> Alice
        this.age  -> 30
        */


        /*
        =====================================================
        COMPARISON
        =====================================================

        Arrow Function:
        - No own 'this'
        - Inherits 'this' from parent scope
        - Not recommended for object methods

        Normal Function:
        - Has its own 'this'
        - 'this' refers to the object calling the method
        - Recommended for object methods

        =====================================================
        RESULT:
        Thus, Arrow Functions do not have their own
        'this' context and should not be used as object
        methods when object properties need to be accessed.
        Normal functions should be used instead.
        =====================================================
        */
    </script>
</body>

</html>
