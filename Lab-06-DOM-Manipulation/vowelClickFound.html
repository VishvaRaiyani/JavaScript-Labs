<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<style>
    button {
        background: linear-gradient(135deg, #6e8efb, #a777e3);
        color: white;
        padding: 12px 28px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -75%;
        width: 50%;
        height: 100%;
        background: rgba(255, 255, 255, 0.3);
        transform: skewX(-20deg);
        transition: 0.5s;
    }

    button:hover::before {
        left: 130%;
    }
</style>

<body id="bodybg">
    <div class="m-3">

        <input type="text" id="inputTxt">
        <p id="vowelFind"></p>
    </div>
    <script>
        document.getElementById("inputTxt").addEventListener("keydown", (e) => {
            if (e.key == 'a' || e.key == 'e' || e.key == 'i' || e.key == 'o' || e.key == 'u' || e.key == 'A' || e.key == 'E' || e.key == 'I' || e.key == 'O' || e.key == 'U') {
                bodybg.style.backgroundColor = 'pink';
                document.getElementById("vowelFind").innerHTML = e.key
            }
            else {
                bodybg.style.backgroundColor = 'lightblue';
                document.getElementById("vowelFind").innerHTML = e.key
            }
            
        })
        document.getElementById("inputTxt").addEventListener("keyup", () => {
            bodybg.style.backgroundColor = 'white';
        })
    </script>
</body>
</html>
