<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
            font-family: Arial, Helvetica, sans-serif;
        }

        .calculator {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            width: 360px;
        }

        input {
            width: 100%;
            height: 55px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-spacing: 8px;
        }

        td {
            width: 25%;
        }

        button {
            width: 100%;
            height: 55px;
            font-size: 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: white;
        }

        button:hover {
            background: #ddd;
        }
    </style>

</head>

<body>

    <div class="calculator">

        <input type="text" id="display" readonly>

        <div>
            <table>
                <tr>
                    <td><button onclick="clearDisplay()">C</button></td>
                    <td><button onclick="del()">⌫</button></td>
                    <td><button onclick="append('%')">%</button></td>
                    <td><button onclick="append('/')">/</button></td>
                </tr>

                <tr>
                    <td><button onclick="append('7')">7</button></td>
                    <td><button onclick="append('8')">8</button></td>
                    <td><button onclick="append('9')">9</button></td>
                    <td><button onclick="append('*')">*</button></td>
                </tr>

                <tr>
                    <td><button onclick="append('4')">4</button></td>
                    <td><button onclick="append('5')">5</button></td>
                    <td><button onclick="append('6')">6</button></td>
                    <td><button onclick="append('-')">-</button></td>
                </tr>

                <tr>
                    <td><button onclick="append('1')">1</button></td>
                    <td><button onclick="append('2')">2</button></td>
                    <td><button onclick="append('3')">3</button></td>
                    <td><button onclick="append('+')">+</button></td>
                </tr>

                <tr>
                    <td><button onclick="append('0')">0</button></td>
                    <td><button onclick="append('.')">.</button></td>
                    <td><button onclick="calculate()">=</button></td>
                    <td><button onclick="sqrt()">√</button></td>
                </tr>

                <tr>
                    <td><button onclick="square()">x²</button></td>
                    <td><button onclick="cube()">x³</button></td>
                    <td><button onclick="sin()">sin</button></td>
                    <td><button onclick="cos()">cos</button></td>
                </tr>

                <tr>
                    <td><button onclick="tan()">tan</button></td>
                    <td><button onclick="log()">log</button></td>
                    <td><button onclick="ln()">ln</button></td>
                    <td><button onclick="pi()">π</button></td>
                </tr>
            </table>
        </div>

    </div>

    <script>

        let display = document.getElementById("display");

        function append(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function del() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            }
            catch {
                display.value = "Error";
            }
        }

        function square() {
            display.value = Math.pow(Number(display.value), 2);
        }

        function cube() {
            display.value = Math.pow(Number(display.value), 3);
        }

        function sqrt() {
            display.value = Math.sqrt(Number(display.value));
        }

        function sin() {
            display.value = Math.sin(Number(display.value) * Math.PI / 180);
        }

        function cos() {
            display.value = Math.cos(Number(display.value) * Math.PI / 180);
        }

        function tan() {
            display.value = Math.tan(Number(display.value) * Math.PI / 180);
        }

        function log() {
            display.value = Math.log10(Number(display.value));
        }

        function ln() {
            display.value = Math.log(Number(display.value));
        }

        function pi() {
            display.value = Math.PI;
        }

    </script>

</body>

</html>
