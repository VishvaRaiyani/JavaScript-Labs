<!DOCTYPE html>
<html>

<head>
    <title>Full Validation Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            max-width: 600px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1em;
        }

        label {
            font-weight: bold;
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .gender-group {
            display: flex;
            gap: 15px;
        }

        .gender-group label {
            font-weight: normal;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2 class="form-title">User Registration Form</h2>

        <form novalidate onsubmit="submitValidate(event)" ">

            <label for="fname">Full Name:</label>
            <input type="text" id="fname" name="fullname" placeholder="Enter full name">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter email">

            <label for="enroll">Enrollment Number:</label>
            <input type="text" id="enroll" name="enroll" placeholder="Enter enrollment number">

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. 9876543210">

            <label>Gender:</label>
            <div class="gender-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>
            <br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="">Select</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Canada</option>
                <option>Australia</option>
            </select>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" placeholder="Enter full address"></textarea>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" minlength="6">

            <label for="confirm">Confirm Password:</label>
            <input type="password" id="confirmpass" name="confirm" minlength="6">

            <button type="submit">Register</button>
        </form>
    </div>

    <script>

        function submitValidate(e) {
            e.preventDefault();
            name = document.getElementById("fname").value;
            email = document.getElementById("email").value;
            phone = document.getElementById("phone").value;
            password = document.getElementById("password").value;
            confirmPass = document.getElementById("confirmpass").value;
            enrollment = document.getElementById("enroll").value;
            dateOfBirth = document.getElementById("dob").value;

            namePattern = /^[A-Za-z\s]+$/;
            emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            phonePattern = /^[0-9]{10}$/;
            passwordPattern = /^[A-Za-z\s]+$/;
            enrollPattern = /^[0-9]{11}$/

            if (name.length < 8) {
                alert("Please enter a valid name (only letters and space).");
                return;
            }

            if (!namePattern.test(name)) {
                alert("Please enter a valid name (only letters and space).");
                return;
            }

            if (!emailPattern.test(email)) {
                alert("Please enter a valid email address.");
                return;
            }

            if (!phonePattern.test(phone)) {
                alert("Please enter a valid phone number.");
                return;
            }

            if (!enrollPattern.test(enrollment)) {
                alert("Please enter a valid enrollment number.");
                return;
            }

            if (!passwordPattern.test(password)) {
                alert("Please enter a valid password.");
                return;
            }
            if (password != confirmPass) {
                alert("Password do not match.");
                return;
            }
            alert("Form submitted successfullly.");
        }
    </script>

</body>

</html>
