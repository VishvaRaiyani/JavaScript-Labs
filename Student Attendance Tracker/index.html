<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<style>
    /* Google Font */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #eef2f7;
        min-height: 100vh;
        padding: 30px;
    }

    .container {
        max-width: 1200px;
        margin: auto;
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, .12);
    }

    h1 {
        text-align: center;
        color: #1f2937;
        margin-bottom: 30px;
        font-size: 35px;
    }

    /* Input Section */

    .input-box {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }

    .input-box input {
        width: 180px;
        padding: 12px;
        border: 2px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        transition: .3s;
    }

    .input-box input:focus {
        border-color: #2563eb;
        outline: none;
    }

    /* Buttons */

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 500;
        color: white;
        transition: .3s;
    }

    button:hover {
        transform: translateY(-2px);
    }

    .load {
        background: #2563eb;
    }

    .load:hover {
        background: #1d4ed8;
    }

    .all-present {
        background: #16a34a;
    }

    .all-present:hover {
        background: #15803d;
    }

    .all-absent {
        background: #dc2626;
    }

    .all-absent:hover {
        background: #b91c1c;
    }

    .reset {
        background: #6b7280;
    }

    .reset:hover {
        background: #4b5563;
    }

    .present-btn {
        background: #22c55e;
    }

    .present-btn:hover {
        background: #16a34a;
    }

    .absent-btn {
        background: #ef4444;
    }

    .absent-btn:hover {
        background: #dc2626;
    }

    /* Action Buttons */

    .actions {
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 25px;
    }

    /* Keyboard Box */

    .shortcut {
        background: #f9fafb;
        border-left: 5px solid #2563eb;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 8px;
    }

    .shortcut h3 {
        margin-bottom: 10px;
        color: #2563eb;
    }

    .shortcut p {
        margin: 6px 0;
    }

    /* Table */

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        overflow: hidden;
        border-radius: 10px;
    }

    th {
        background: #2563eb;
        color: white;
        padding: 15px;
        font-size: 16px;
    }

    td {
        text-align: center;
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
    }

    tr:nth-child(even) {
        background: #f8fafc;
    }

    tr:hover {
        background: #eef6ff;
    }

    /* Current Selected Row */

    .active {
        background: #fff3cd !important;
    }

    /* Status */

    .present {
        color: #16a34a;
        font-weight: bold;
    }

    .absent {
        color: #dc2626;
        font-weight: bold;
    }

    .pending {
        color: #f59e0b;
        font-weight: bold;
    }

    /* Summary */

    #summary {
        margin-top: 25px;
        background: #f8fafc;
        border-left: 6px solid #2563eb;
        padding: 20px;
        border-radius: 10px;
        font-size: 18px;
        line-height: 1.8;
        font-weight: 600;
    }

    /* Responsive */

    @media(max-width:768px) {

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 28px;
        }

        .input-box,
        .actions {
            flex-direction: column;
            align-items: center;
        }

        .input-box input,
        button {
            width: 100%;
        }

        table {
            font-size: 14px;
        }

        th,
        td {
            padding: 10px;
        }
    }
</style>

<body>

    <div class="container">

        <h1>Student Attendance Tracker</h1>

        <!-- Start & End Roll Number -->
        <div class="input-box">

            <input type="number" id="start" placeholder="Start Roll No">

            <input type="number" id="end" placeholder="End Roll No">

            <button class="load" onclick="loadStudents()">
                Load Students
            </button>

        </div>

        <!-- Action Buttons -->
        <div class="actions">

            <button class="all-present" onclick="allPresent()">
                All Present
            </button>

            <button class="all-absent" onclick="allAbsent()">
                All Absent
            </button>

            <button class="reset" onclick="resetAttendance()">
                Reset Attendance
            </button>

        </div>

        <!-- Keyboard Shortcut -->
        <div class="shortcut">

            <h3>Keyboard Shortcuts</h3>

            <p><b>⬅ Left Arrow</b> → Present</p>
            <p><b>➡ Right Arrow</b> → Absent</p>
            <p><b>⬆ Up Arrow</b> → Previous Row</p>
            <p><b>⬇ Down Arrow</b> → Next Row</p>

        </div>

        <!-- Attendance Table -->
        <table id="table">

        </table>

        <!-- Summary -->
        <div id="summary">

            Present : 0 |
            Absent : 0

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
