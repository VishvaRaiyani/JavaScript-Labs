<!DOCTYPE html>
<html>

<head>
    <title>Factorial</title>
</head>

<body>

    <script>
        num = parseInt(prompt("Enter a number:"));
        fact = 1;

        for (i = 1; i <= num; i++) {
            fact = fact * i;
        }

        alert("Factorial = " + fact);
    </script>

</body>

</html>
