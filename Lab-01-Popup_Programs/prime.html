<!DOCTYPE html>
<html>

<head>
    <title>Prime Number</title>
</head>

<body>

    <script>
        num = parseInt(prompt("Enter a number:"));
        prime = true;

        if (num <= 1) {
            prime = false;
        }
        else {
            for (i = 2; i < num; i++) {
                if (num % i == 0) {
                    prime = false;
                    break;
                }
            }
        }

        if (prime)
            alert(num + " is Prime");
        else
            alert(num + " is Not Prime");
    </script>

</body>

</html>
