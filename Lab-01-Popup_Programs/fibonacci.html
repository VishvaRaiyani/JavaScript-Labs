<!DOCTYPE html>
<html>

<head>
    <title>Fibonacci Series</title>
</head>

<body>

    <script>
        n = parseInt(prompt("Enter number of terms:"));

        a = 0;
        b = 1;
        c;

        // in js to display the output we can use document.write() function
        // in this we have to write html tags in " " 
        document.write("Fibonacci Series:<br>");
        document.write(a + "<br>");
        document.write(b + "<br>");

        for (i = 3; i <= n; i++) {
            c = a + b;
            document.write(c + "<br>");
            a = b;
            b = c;
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 0 1 1 2 3 5
        n = parseInt(prompt("Enter number for fibonacci series : "));
        firstStep = 0;
        secondStep = 1;
        sum = 0

        

        for (i = 0; i < n; i++) {
            document.write(sum + ", ");
            firstStep = secondStep;
            secondStep = sum;
            sum = firstStep + secondStep;
        }

    </script>
</body>

</html>
